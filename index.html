<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>STUDYVERSE | مجتمعات تعاونية حقيقية</title>
    <!-- Fonts & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', 'IBM Plex Sans Arabic', sans-serif; background: radial-gradient(circle at 10% 20%, #0f172a, #1e1b4b); }
        .glass-edge { backdrop-filter: blur(16px); background: rgba(15, 23, 42, 0.55); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .sidebar-icon:hover .channel-name { max-width: 130px; opacity: 1; margin-right: 8px; }
        .channel-name { max-width: 0; opacity: 0; overflow: hidden; white-space: nowrap; transition: 0.2s; }
        .story-ring { background: linear-gradient(135deg, #f97316, #ec4899); border-radius: 50%; padding: 2px; }
        .story-ring-inner { background: #0f172a; border-radius: 50%; width: 100%; height: 100%; overflow: hidden; }
        .like-animation { animation: heartPop 0.3s ease-in-out; }
        @keyframes heartPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); color: #ec4899; }
            100% { transform: scale(1); }
        }
        .toast { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="text-white">

<!-- Toast Container -->
<div id="toastContainer" class="fixed top-4 left-4 z-50 space-y-2"></div>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden items-center justify-center">
    <div class="text-center">
        <i class="fas fa-spinner fa-pulse fa-3x text-cyan-400"></i>
        <p class="mt-2 text-white">جاري التحميل...</p>
    </div>
</div>

<!-- Auth Screen -->
<div id="authScreen" class="min-h-screen flex items-center justify-center p-4">
    <div class="glass-edge p-8 max-w-md w-full text-center">
        <i class="fas fa-graduation-cap text-5xl text-cyan-400 mb-4"></i>
        <h1 class="text-3xl font-bold">STUDYVERSE</h1>
        <p class="text-slate-300 mb-6">سجل دخول لتبدأ رحلتك الحقيقية</p>
        <div class="space-y-4">
            <input type="text" id="signupName" placeholder="الاسم الكامل" class="w-full p-3 rounded-xl bg-black/40 border border-white/20 focus:outline-none focus:ring-2 focus:ring-cyan-400">
            <input type="email" id="signupEmail" placeholder="البريد الإلكتروني" class="w-full p-3 rounded-xl bg-black/40 border border-white/20 focus:outline-none focus:ring-2 focus:ring-cyan-400">
            <input type="password" id="signupPass" placeholder="كلمة المرور (6 أحرف على الأقل)" class="w-full p-3 rounded-xl bg-black/40 border border-white/20 focus:outline-none focus:ring-2 focus:ring-cyan-400">
            <button id="signupBtn" class="w-full bg-cyan-500 p-3 rounded-xl font-bold hover:bg-cyan-600 transition">إنشاء حساب</button>
            <hr class="border-white/20">
            <input type="email" id="loginEmail" placeholder="البريد" class="w-full p-3 rounded-xl bg-black/40 border border-white/20 focus:outline-none focus:ring-2 focus:ring-purple-400">
            <input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full p-3 rounded-xl bg-black/40 border border-white/20 focus:outline-none focus:ring-2 focus:ring-purple-400">
            <button id="loginBtn" class="w-full bg-purple-600 p-3 rounded-xl font-bold hover:bg-purple-700 transition">تسجيل دخول</button>
        </div>
    </div>
</div>

<!-- Main App -->
<div id="mainApp" class="hidden flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-24 bg-black/30 backdrop-blur-xl border-l border-white/10 flex flex-col items-center py-6 overflow-y-auto">
        <div class="text-center mb-4 text-xs font-bold text-cyan-400">مجتمعاتي</div>
        <div id="communitiesList" class="space-y-4 w-full flex flex-col items-center"></div>
        <button id="searchUserBtn" class="mt-8 text-cyan-400 text-sm hover:text-cyan-300 transition"><i class="fas fa-user-plus"></i> أضف صديق</button>
        <button id="logoutBtn" class="mt-4 text-red-400 text-sm hover:text-red-300 transition"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </aside>
    
    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden p-4">
        <div class="flex justify-between items-center flex-wrap gap-2">
            <h2 id="communityHeader" class="text-xl font-bold">اختر مجتمعاً</h2>
            <button id="publishPostBtn" class="bg-cyan-500 px-4 py-2 rounded-xl text-sm hover:bg-cyan-600 transition"><i class="fas fa-pen"></i> نشر منشور</button>
        </div>
        
        <!-- Post Input -->
        <div class="mt-3 space-y-2">
            <textarea id="newPostContent" placeholder="شارك سؤالك أو فكرتك..." class="w-full p-3 rounded-xl bg-black/40 border border-white/20 focus:outline-none focus:ring-2 focus:ring-cyan-400" rows="2"></textarea>
            <div class="flex gap-2">
                <input type="file" id="postImage" accept="image/*" class="text-sm bg-black/40 rounded p-1 flex-1">
                <div id="postImagePreview" class="hidden relative">
                    <img id="previewImg" class="h-16 rounded" alt="Preview">
                    <button id="removeImagePreview" class="absolute -top-2 -right-2 bg-red-500 rounded-full w-5 h-5 text-xs">×</button>
                </div>
            </div>
        </div>
        
        <!-- Posts Container -->
        <div id="communityPosts" class="flex-1 overflow-y-auto mt-5 space-y-4"></div>
        <button id="loadMorePostsBtn" class="hidden mt-3 bg-white/10 py-2 rounded-xl hover:bg-white/20 transition">تحميل المزيد</button>
    </main>
    
    <!-- Right Sidebar -->
    <aside class="w-80 bg-black/30 backdrop-blur-xl border-r border-white/10 p-4 overflow-y-auto space-y-5">
        <!-- Stories -->
        <div>
            <h3 class="text-sm font-bold">📸 قصص الأصدقاء</h3>
            <div id="storiesContainer" class="flex overflow-x-auto py-2 gap-2"></div>
            <input type="file" id="storyFile" accept="image/*,video/*" class="text-xs mt-2 w-full bg-black/40 rounded p-1">
            <button id="uploadStoryBtn" class="text-xs bg-purple-500/40 p-1 rounded-full w-full mt-1 hover:bg-purple-500/60 transition">أضف قصتك</button>
        </div>
        
        <!-- Reels -->
        <div>
            <h3 class="text-sm font-bold">🎥 الريلز</h3>
            <div id="reelsFeed" class="max-h-96 overflow-y-auto space-y-3"></div>
            <div class="mt-2 p-2 glass-edge">
                <input type="text" id="reelCaption" placeholder="وصف الريلز" class="w-full p-1 text-sm bg-black/40 rounded mb-1 focus:outline-none">
                <input type="file" id="reelFile" accept="video/*" class="text-xs my-1 w-full">
                <div id="reelPreview" class="hidden mb-1">
                    <video id="reelPreviewVideo" controls class="w-full rounded max-h-32"></video>
                </div>
                <button id="uploadReelBtn" class="text-xs bg-cyan-500 p-1 rounded w-full hover:bg-cyan-600 transition">رفع ريلز</button>
            </div>
        </div>
        
        <!-- Friend Requests -->
        <div>
            <h3 class="text-sm font-bold">🤝 طلبات الصداقة</h3>
            <div id="friendsRequestsList" class="text-xs space-y-2"></div>
        </div>
        
        <div class="text-center text-[10px] text-slate-400 pt-4 border-t border-white/10">
            STUDYVERSE 🎓 تعلم مع الأصدقاء
        </div>
    </aside>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
